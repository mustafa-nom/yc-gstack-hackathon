account:
  name: "productivity-test"
  handle: "@productivityhacks"

audience:
  description: >
    Ambitious 25-35 year old professionals — founders, PMs, consultants — who feel
    buried in work and want systems to get more done without burning out. Already
    high performers who want to level up their output, not just "be productive."
  pain_points:
    - "too many tasks, never feel done"
    - "context-switching kills deep work"
    - "feel busy but not actually moving the needle"
  seeking: "systems and tools that create leverage, not just to-do lists"

tone:
  voice: "Sharp, systems-minded, slightly nerdy. Talks in frameworks and ratios. Respects the viewer's intelligence. No hustle-porn."
  title_style: "Counterintuitive insight or little-known system"
  example_hooks:
    - "The scheduling trick that gave me 2 extra hours a day"
    - "Why your to-do list is making you less productive"
    - "How top founders protect their deep work time"

visual_identity:
  vibe: "Minimal home office, focused energy, clean desk"
  aesthetic_keywords:
    - "minimal"
    - "focused"
    - "monochrome"
    - "intentional"
    - "clean"
  color_palette:
    - "white"
    - "warm gray"
    - "black"
    - "muted beige"
  what_not_to_show:
    - "cluttered desks"
    - "neon gaming setups"
    - "corporate open offices"
    - "cheesy motivational posters"

content:
  slides_per_carousel: 6
  topics_per_batch: 3

image_generation:
  base_prompt: >
    Candid iPhone photo, natural light, photorealistic, no text, no watermark,
    no phone frame, full bleed edge-to-edge
  aspect_ratio: "9:16"
  title_prompt: >
    Person sitting at a minimal home office desk viewed from behind or side, typing on a MacBook,
    single coffee mug, warm morning window light, white walls, no clutter, face not visible,
    shot from shoulder height or behind, shallow depth of field, muted warm tones, candid iPhone feel
  scene_variety:
    - "Overhead flat lay of a clean desk with notebook, pen, and coffee — white surface, warm light, no people, no digital screens"
    - "Close-up of an open notebook with handwritten notes, fountain pen beside it, soft blurred background, warm afternoon light"
    - "Empty minimal office corner, white walls, single plant, late afternoon golden light through window, no people"
    - "Wide shot of a clean home workspace, monitor showing a blank screen, minimal objects, cool morning light, no people"
    - "Low angle shot along a clean white desk surface, objects in soft focus in background, no people, stark minimal composition"

text_overlay:
  font_size_title: 52
  font_size_body: 36
  font_size_subtitle: 38
  text_color: "#FFFFFF"
  text_shadow: true
  overlay_opacity: 0.75
  slide_margin: 44
  box_padding: 28
