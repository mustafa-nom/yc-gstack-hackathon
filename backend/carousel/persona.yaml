account:
  name: "hackathon-demo"
  handle: "@hackathonacc"

audience:
  description: >
    Serious-but-time-constrained male lifters (22–38), desk workers, busy lifestyles,
    intermediate level. Topics: efficient training, recovery, consistency, mental habits.
    Not beginner gym bros — intermediate lifters optimizing around work and life constraints.
  pain_points:
    - "limited time between work and training"
    - "plateauing despite consistent effort"
    - "recovery falling behind volume"
  seeking: "efficient optimization, not motivation — they already lift"

tone:
  voice: "Direct, slightly contrarian, time/effort-framed. Treats the viewer as someone who already lifts and wants the optimization. No motivation fluff, no beginner basics."
  title_style: "Direct contrarian hook"
  example_hooks:
    - "Why your warm-up is holding back your gains"
    - "How desk workers can build serious muscle"
    - "Things I stopped doing that made lifting easier"

visual_identity:
  vibe: "Serious intermediate lifter. Real gym. No cringe."
  aesthetic_keywords:
    - "masculine"
    - "gritty"
    - "utilitarian"
    - "disciplined"
    - "unbranded"
  scene_elements:
    - "actual gym — plates, rack, dumbbells, mirrors, chalk bowl"
    - "hoodie, lifting tee, or tank — worn in, not new"
    - "dim overhead gym lighting (harsh fluorescents or warm LEDs)"
  color_palette:
    - "black"
    - "charcoal"
    - "gunmetal"
    - "white"
  what_not_to_show:
    - "home garage gym"
    - "aesthetic gym-girl vibes"
    - "pastels"
    - "motivational posters with sunsets"

content:
  slides_per_carousel: 6   # total slides including title slide
  topics_per_batch: 3

image_generation:
  base_prompt: >
    Candid iPhone photo, no text, no watermark, no social media UI, no phone frame,
    full bleed edge-to-edge, realistic photographic grain, not AI-aesthetic
  aspect_ratio: "9:16"
  title_prompt: >
    Mirror selfie of a JACKED guy early 20s, thick chest broad capped shoulders full pumped
    biceps defined abs, shirtless, grey joggers, black baseball cap brim all the way down
    hiding face, wall of dumbbells behind him, real commercial gym dark painted walls,
    flat overhead panel lights, cool muted dark tones, natural low-light grain
  scene_variety:
    - "Low angle shot looking along gym floor toward rows of heavy equipment receding into distance, dark rubber flooring, dim overhead LED panel lights, moody atmosphere, no people"
    - "Tight close-up of heavy black iron dumbbells resting on a rack, rubber floor texture in foreground, background softly blurred, dim lighting, no people"
    - "Wide shot of full gym space showing multiple machines and squat racks, black ceiling overhead, overhead fluorescent lighting, no people"
    - "Upward shot from below a barbell loaded with plates on a squat rack, ceiling and overhead lights visible above, dark gym atmosphere, no people"
    - "Ground-level dark gym corner with kettlebells and weight plates scattered on rubber flooring, moody low light, no people"

text_overlay:
  font_size_title: 52
  font_size_body: 36
  font_size_subtitle: 38
  text_color: "#FFFFFF"
  text_shadow: true
  overlay_opacity: 0.75
  slide_margin: 44
  box_padding: 28
