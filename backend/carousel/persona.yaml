account:
  name: "hackathon-demo"
  handle: "@hackathonacc"

audience:
  description: >
    Serious-but-time-constrained male lifters (22–38), desk workers, busy lifestyles,
    intermediate level. Topics: efficient training, recovery, consistency, mental habits.
    Not beginner gym bros — intermediate lifters optimizing around work and life constraints.
  pain_points:
    - "limited time between work and training"
    - "plateauing despite consistent effort"
    - "recovery falling behind volume"
  seeking: "efficient optimization, not motivation — they already lift"

tone:
  voice: "Direct, slightly contrarian, time/effort-framed. Treats the viewer as someone who already lifts and wants the optimization. No motivation fluff, no beginner basics."
  title_style: "Direct contrarian hook"
  example_hooks:
    - "Why your warm-up is holding back your gains"
    - "How desk workers can build serious muscle"
    - "Things I stopped doing that made lifting easier"
