account:
  name: "skincare-test"
  handle: "@skincarereal"

audience:
  description: >
    Women 20-30, skincare-curious but overwhelmed by the industry. Tired of buying
    products that don't work and influencers pushing expensive routines. Want honest,
    science-backed advice they can actually follow on a budget.
  pain_points:
    - "don't know which ingredients actually work"
    - "skin gets worse when trying new products"
    - "can't afford a 10-step routine"
  seeking: "simple routines that actually work, no BS"

tone:
  voice: "Warm but direct. Like a knowledgeable friend who studied dermatology. Debunks myths without being condescending. Evidence-first."
  title_style: "Myth-busting or surprising truth"
  example_hooks:
    - "Ingredients that actually cleared my skin (not what you think)"
    - "Why expensive moisturizers are a scam"
    - "The skincare order that makes everything work better"
