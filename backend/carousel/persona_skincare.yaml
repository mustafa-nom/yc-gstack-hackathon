account:
  name: "skincare-test"
  handle: "@skincarereal"

audience:
  description: >
    Women 20-30, skincare-curious but overwhelmed by the industry. Tired of buying
    products that don't work and influencers pushing expensive routines. Want honest,
    science-backed advice they can actually follow on a budget.
  pain_points:
    - "don't know which ingredients actually work"
    - "skin gets worse when trying new products"
    - "can't afford a 10-step routine"
  seeking: "simple routines that actually work, no BS"

tone:
  voice: "Warm but direct. Like a knowledgeable friend who studied dermatology. Debunks myths without being condescending. Evidence-first."
  title_style: "Myth-busting or surprising truth"
  example_hooks:
    - "Ingredients that actually cleared my skin (not what you think)"
    - "Why expensive moisturizers are a scam"
    - "The skincare order that makes everything work better"

visual_identity:
  vibe: "Soft bathroom light, dewy glass skin, clean beauty shelfie"
  aesthetic_keywords:
    - "soft"
    - "dewy"
    - "clean"
    - "warm"
    - "minimal"
  color_palette:
    - "blush"
    - "cream"
    - "warm white"
    - "soft peach"
  what_not_to_show:
    - "harsh fluorescent lighting"
    - "cluttered bathroom counters"
    - "before/after skin photos"
    - "masculine or gym aesthetics"

content:
  slides_per_carousel: 6
  topics_per_batch: 3

image_generation:
  base_prompt: >
    Candid iPhone photo, soft natural light, photorealistic, warm and airy feel,
    no text, no watermark, no phone frame, full bleed edge-to-edge
  aspect_ratio: "9:16"
  title_prompt: >
    Woman applying skincare in a bright bathroom, shot from the side or behind — face not visible,
    hands touching her neck or cheek, soft window light, blurred warm background,
    cream and peach tones, dewy glowing skin on neck and shoulder visible,
    candid iPhone feel, no text, no watermark
  scene_variety:
    - "Flat lay of minimal skincare products on a white marble surface, soft window light from above, cream and glass textures, no people"
    - "Close-up of a glass serum bottle on a bathroom shelf, soft blurred background, warm morning light, dewy feel, no people"
    - "Overhead shot of a clean bathroom counter with a few products arranged simply, white towel folded beside them, soft natural light"
    - "Blurred bokeh bathroom background with a single product in sharp focus in the foreground, warm pink and cream tones, no people"
    - "Side-lit close-up of water droplets on a smooth glass surface, abstract and airy, soft peach and cream color palette, no people"

text_overlay:
  font_size_title: 52
  font_size_body: 36
  font_size_subtitle: 38
  text_color: "#FFFFFF"
  text_shadow: true
  overlay_opacity: 0.75
  slide_margin: 44
  box_padding: 28
