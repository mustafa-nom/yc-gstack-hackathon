account:
  name: "my-tiktok-account"
  handle: "@myaccount"

audience:
  description: "Overwhelmed Gen-Z women 20-30 looking for calm productivity apps and gentle routines"
  pain_points:
    - "too many tabs open, can't focus"
    - "guilt about not doing enough"
    - "want to be organized but feel overwhelmed"
  seeking: "apps that feel supportive, not demanding"

tone:
  voice: "Soft, friendly, first-person. Reassuring like a friend who found something that helped."
  title_style: "short Title-Case listicle"  # e.g. "5 Apps for ADHD Mornings"
  example_hooks:
    - "5 Apps That Actually Help Me Focus"
    - "Things That Fixed My Mornings"
    - "Apps for When You're Scattered and Overwhelmed"

visual_identity:
  vibe: "Soft bedroom corner, mid-afternoon light, tired-but-trying"
  aesthetic_keywords:
    - "cozy"
    - "warm"
    - "muted"
    - "feminine"
    - "introspective"
  scene_elements:
    - "unmade bed, linen sheets, soft pillows"
    - "nightstand with candle, journal, water glass"
    - "afternoon window light, slightly filtered"
    - "trailing plant (pothos, ferns)"
  color_palette:
    - "cream"
    - "blush"
    - "sage"
    - "muted lavender"
    - "dusty rose"
  what_not_to_show:
    - "gym equipment"
    - "corporate settings"
    - "harsh lighting"
    - "neon colors"
    - "clutter"
    - "masculine palette"

content:
  slides_per_carousel: 6   # total slides including title slide
  topics_per_batch: 3

image_generation:
  base_prompt: >
    Realistic candid lifestyle photography, natural lighting, photorealistic, iPhone photo quality,
    no text in image, no watermarks, authentic feel — not staged, not AI-aesthetic
  aspect_ratio: "9:16"
  scene_variety:
    # Each slide should get a DIFFERENT type of scene
    - "cozy bedroom interior, warm lamp light, rumpled linen sheets, nightstand with book and candle"
    - "restaurant table with food, overhead angle, natural window light, marble surface"
    - "outdoor scenic view, ocean or nature, wide shot, natural sky"
    - "urban or fashion setting, staircase or hallway, warm interior tones"
    - "luxury bathroom or spa, marble, soft natural light from above"

text_overlay:
  font_size_title: 48        # bold numbered title
  font_size_body: 36         # paragraph body text
  font_size_subtitle: 34     # slide 1 subtitle
  text_color: "#FFFFFF"
  text_shadow: true
  overlay_opacity: 0.72      # darkness of the rounded box background
  slide_margin: 44           # px from slide edges to box
  box_padding: 26            # inner padding inside the box
